<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CIMSOLUTIONS Admin Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 32px;
      width: 360px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
    }
    h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }
    p {
      color: #555;
      font-size: 14px;
      margin-bottom: 24px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0f5ca8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .error {
      color: #b00020;
      margin-bottom: 12px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Portal</h1>
    <p>Sign in to manage infrastructure services.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <input name="username" placeholder="Username" autocomplete="off">
      <input name="password" type="password" placeholder="Password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
