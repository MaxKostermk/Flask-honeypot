<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CIMSOLUTIONS Admin Portal</title>
</head>
<body>
  <div class="card">
    <h1>CIMSOLUTIONS Admin Portal</h1>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <input name="username" placeholder="Username" autocomplete="off">
      <input name="password" type="password" placeholder="Password">
      <button type="submit" href="/dashboard.html">Sign in</button>
    </form>
  </div>
</body>
</html>
